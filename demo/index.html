<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tempo</title>
    <meta name="theme-color" content="#dceffd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tempo" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <script>
      (function () {
        const isLocalDev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        const assetVersion = isLocalDev ? `dev-${Date.now()}` : "20260317a";

        window.__TEMPO_ASSET_VERSION__ = assetVersion;
        window.__TEMPO_LOCAL_DEV__ = isLocalDev;

        if (!isLocalDev) {
          const manifest = document.createElement("link");
          manifest.rel = "manifest";
          manifest.href = `./manifest.webmanifest?v=${assetVersion}`;
          document.head.appendChild(manifest);
        }

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `./styles.css?v=${assetVersion}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <div id="networkBanner" class="network-banner hidden" role="status" aria-live="polite"></div>
      <div id="updateBanner" class="update-banner hidden" role="status" aria-live="polite">
        <span>发现新版本，点一下更新。</span>
        <button id="applyUpdateButton" class="inline-button update-action" type="button">立即更新</button>
      </div>
      <div id="confirmModal" class="confirm-modal hidden" aria-hidden="true">
        <button id="confirmBackdrop" class="confirm-backdrop" type="button" aria-label="关闭确认弹层"></button>
        <div class="confirm-sheet" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
          <p id="confirmTitle" class="confirm-title">确认操作</p>
          <p id="confirmMessage" class="confirm-message"></p>
          <div class="confirm-actions">
            <button id="confirmCancelButton" class="inline-button" type="button">取消</button>
            <button id="confirmAcceptButton" class="primary-button danger" type="button">确认</button>
          </div>
        </div>
      </div>
      <main class="screen">
        <section id="homeView" class="view is-active" data-view="home">
          <header class="topbar">
            <div>
              <p class="eyebrow">Home</p>
              <h1>首页</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row compact">
              <div>
                <p class="eyebrow">搜索区</p>
              </div>
            </div>
            <label class="search-box">
              <span class="search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M10.5 4.5a6 6 0 1 0 0 12a6 6 0 0 0 0-12Zm0-1.5a7.5 7.5 0 1 1 4.73 13.32l4.22 4.21a.75.75 0 1 1-1.06 1.06l-4.21-4.22A7.5 7.5 0 0 1 10.5 3Z" fill="currentColor"/>
                </svg>
              </span>
              <span class="sr-only">搜索具体项目</span>
              <input id="projectSearch" type="search" placeholder="搜索具体项目" />
            </label>
            <div id="searchFeedback" class="summary-row"></div>
            <div id="homeEmptyCreate"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">当前本人任务区</p>
                <h2>本人正在进行</h2>
              </div>
            </div>
            <div id="currentSelfTask"></div>
            <div class="panel-divider"></div>
            <div class="panel-title-row compact">
              <div>
                <p class="eyebrow">运行中的 Agent 任务区</p>
                <h3>Agent 任务</h3>
              </div>
            </div>
            <div id="runningAgentTasks" class="stack-list"></div>
          </section>

          <section class="panel project-list-panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">项目列表区</p>
                <h2>点击即可开始</h2>
              </div>
              <div class="segmented-control">
                <button id="recentModeButton" class="segment is-active" type="button">最近使用</button>
                <button id="frequentModeButton" class="segment" type="button">最常使用</button>
              </div>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>

        </section>

        <section id="historyView" class="view" data-view="history">
          <header class="topbar">
            <div>
              <p class="eyebrow">History</p>
              <h1>历史记录</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">排序控件区</p>
                <h2>找回发生过的事</h2>
              </div>
              <select id="historySort">
                <option value="duration">耗时长到短</option>
                <option value="desc">时间倒序</option>
                <option value="asc">时间正序</option>
              </select>
            </div>
            <div class="history-filter-grid">
              <input id="historyProjectSearch" type="search" placeholder="按具体项目检索" />
              <select id="historyDateMode">
                <option value="all">不限</option>
                <option value="day">天</option>
                <option value="week">周</option>
                <option value="month">月</option>
                <option value="year">年</option>
              </select>
              <div id="historyDateSearchWrap" class="hidden">
                <input id="historyDateSearch" type="date" />
              </div>
            </div>
            <div id="historySummary" class="summary-row"></div>
            <div id="historyList" class="history-list"></div>
          </section>
        </section>

        <section id="dashboardView" class="view" data-view="dashboard">
          <header class="topbar">
            <div>
              <p class="eyebrow">Dashboard</p>
              <h1>仪表盘</h1>
            </div>
          </header>

          <section class="panel dashboard-hero-panel">
            <div class="dashboard-hero-copy">
              <p class="eyebrow">Work Ledger</p>
              <h2>投入不会消失，它会沉淀成盈余或负债。</h2>
            </div>
            <div id="dashboardDebtHero"></div>
          </section>

          <section class="panel">
            <div id="dashboardTodayProgress"></div>
          </section>

          <section class="panel dashboard-trend-panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">趋势</p>
                <h2>工时的走向</h2>
              </div>
            </div>
            <div class="dashboard-toolbar">
              <div id="dashboardChartModeControls" class="segmented-control dashboard-mode-control">
                <button class="segment dashboard-mode-button is-active" data-chart-mode="line" type="button">折线</button>
                <button class="segment dashboard-mode-button" data-chart-mode="bar" type="button">柱状</button>
              </div>
              <span class="dashboard-toolbar-slash" aria-hidden="true">/</span>
              <div id="dashboardRangeControls" class="segmented-control dashboard-range-control">
                <button class="segment dashboard-range-button is-active" data-range="7d" type="button">7天</button>
                <button class="segment dashboard-range-button" data-range="30d" type="button">30天</button>
                <button class="segment dashboard-range-button" data-range="180d" type="button">180天</button>
                <button class="segment dashboard-range-button" data-range="1y" type="button">1年</button>
                <button class="segment dashboard-range-button" data-range="3y" type="button">3年</button>
              </div>
            </div>
            <div id="dashboardTrend"></div>
          </section>

          <section class="panel">
            <button id="dashboardTypeToggle" class="dashboard-collapse-button" type="button" aria-expanded="false">
              <span>
                <p class="eyebrow">项目类型分布</p>
                <strong>点开看时间都花去哪了</strong>
              </span>
              <span id="dashboardTypeToggleLabel" class="muted">展开</span>
            </button>
            <div id="dashboardTypeBreakdown" class="hidden"></div>
          </section>
        </section>

        <section id="meView" class="view" data-view="me">
          <header class="topbar manage-topbar">
            <div class="manage-header-stack">
              <p class="eyebrow">Manage</p>
              <h1 class="sr-only">Manage</h1>
              <form id="manageNicknameForm" class="manage-title-form">
                <label class="sr-only" for="manageTitleInput">修改昵称</label>
                <input id="manageTitleInput" class="manage-title-input" type="text" placeholder="输入昵称" maxlength="24" required />
                <button id="manageTitleConfirmButton" class="inline-button manage-title-confirm hidden" type="submit">确认</button>
              </form>
              <div id="manageTitleHint" class="inline-hint manage-title-hint"></div>
            </div>
          </header>

          <section class="manage-accordion-stack">
            <article class="manage-accordion-item">
              <button id="dashboardSettingsToggle" class="manage-accordion-pill" type="button" aria-expanded="false">
                <span>仪表盘相关设置</span>
                <span class="manage-accordion-icon" aria-hidden="true"></span>
              </button>
              <div id="dashboardSettingsSection" class="panel manage-accordion-panel hidden">
                <div class="panel-title-row compact">
                  <div>
                    <p class="eyebrow">仪表盘相关设置</p>
                    <h2>先把工时的账本规则定清楚</h2>
                  </div>
                  <div class="profile-actions">
                    <button id="dashboardSettingsActionButton" class="inline-button" type="button">编辑</button>
                    <button id="dashboardSettingsCancelButton" class="inline-button hidden" type="button">取消</button>
                  </div>
                </div>
                <form id="dashboardSettingsForm" class="stack-form">
                  <input id="dashboardTargetHoursInput" type="number" min="0.5" step="0.5" placeholder="每日目标工时，例如 8" required />
                  <input id="dashboardHourlyRateInput" type="number" min="0" step="1" placeholder="预估时薪，例如 120" required />
                  <input id="dashboardDebtStartDateInput" type="date" required />
                </form>
                <div id="dashboardSettingsHint" class="inline-hint"></div>
              </div>
            </article>

            <article class="manage-accordion-item">
              <button id="typeSectionToggle" class="manage-accordion-pill" type="button" aria-expanded="false">
                <span>项目类型管理区</span>
                <span class="manage-accordion-icon" aria-hidden="true"></span>
              </button>
              <div id="typeSection" class="panel manage-accordion-panel hidden">
                <div class="panel-title-row compact">
                  <div>
                    <p class="eyebrow">项目类型管理区</p>
                    <h2>先把骨架管住</h2>
                  </div>
                </div>
                <div class="manage-toolbar">
                  <button id="toggleTypeCreateButton" class="inline-button" type="button">新增项目类型</button>
                </div>
                <form id="typeForm" class="stack-form hidden">
                  <input id="typeNameInput" type="text" placeholder="新建项目类型，例如：生活 / 工作 / 学习" required />
                  <button class="primary-button" type="submit">保存新项目类型</button>
                </form>
                <div id="typeConstraintHint" class="inline-hint"></div>
                <div id="typeList" class="stack-list manage-list"></div>
              </div>
            </article>

            <article class="manage-accordion-item">
              <button id="projectSectionToggle" class="manage-accordion-pill" type="button" aria-expanded="false">
                <span>具体项目管理区</span>
                <span class="manage-accordion-icon" aria-hidden="true"></span>
              </button>
              <div id="projectSection" class="panel manage-accordion-panel hidden">
                <div class="panel-title-row compact">
                  <div>
                    <p class="eyebrow">具体项目管理区</p>
                    <h2>活跃和归档分开看</h2>
                  </div>
                </div>
                <div class="manage-toolbar">
                  <button id="toggleProjectCreateButton" class="inline-button" type="button">新增具体项目</button>
                  <button id="toggleArchivedButton" class="inline-button" type="button">查看已归档项目</button>
                </div>
                <form id="projectForm" class="stack-form hidden">
                  <select id="projectTypeSelect" required></select>
                  <input id="projectNameInput" type="text" placeholder="新建具体项目，例如：散步 / 阅读 / 跑训练" required />
                  <select id="projectActorSelect" required>
                    <option value="self">本人</option>
                    <option value="agent">Agent</option>
                  </select>
                  <button class="primary-button" type="submit">保存新具体项目</button>
                </form>
                <div id="projectAdminList" class="stack-list manage-list"></div>
                <div id="archivedProjectList" class="stack-list manage-list hidden"></div>
              </div>
            </article>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="一级页面导航">
        <button class="nav-item is-active" data-nav="home" type="button">
          <span class="nav-label-cn">首页</span>
          <span class="nav-label-en">Home</span>
        </button>
        <button class="nav-item" data-nav="history" type="button">
          <span class="nav-label-cn">历史记录</span>
          <span class="nav-label-en">History</span>
        </button>
        <button class="nav-item" data-nav="dashboard" type="button">
          <span class="nav-label-cn">仪表盘</span>
          <span class="nav-label-en">Dashboard</span>
        </button>
        <button class="nav-item" data-nav="me" type="button">
          <span id="manageNavLabel" class="nav-label-cn">我</span>
          <span class="nav-label-en">Manage</span>
        </button>
      </nav>
    </div>

    <script>
      (function () {
        const script = document.createElement("script");
        script.src = `./app.js?v=${window.__TEMPO_ASSET_VERSION__ || "20260317a"}`;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
