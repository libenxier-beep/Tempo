<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tempo</title>
    <meta name="theme-color" content="#dceffd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tempo" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <script>
      (function () {
        const isLocalDev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        const assetVersion = isLocalDev ? `dev-${Date.now()}` : "20260316e";

        window.__TEMPO_ASSET_VERSION__ = assetVersion;
        window.__TEMPO_LOCAL_DEV__ = isLocalDev;

        if (!isLocalDev) {
          const manifest = document.createElement("link");
          manifest.rel = "manifest";
          manifest.href = `./manifest.webmanifest?v=${assetVersion}`;
          document.head.appendChild(manifest);
        }

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `./styles.css?v=${assetVersion}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <div id="networkBanner" class="network-banner hidden" role="status" aria-live="polite"></div>
      <div id="updateBanner" class="update-banner hidden" role="status" aria-live="polite">
        <span>发现新版本，点一下更新。</span>
        <button id="applyUpdateButton" class="inline-button update-action" type="button">立即更新</button>
      </div>
      <main class="screen">
        <section id="homeView" class="view is-active" data-view="home">
          <header class="topbar">
            <div>
              <p class="eyebrow">Home</p>
              <h1>首页</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row compact">
              <div>
                <p class="eyebrow">搜索区</p>
                <h2>找项目，直接开跑</h2>
              </div>
            </div>
            <label class="search-box">
              <span class="sr-only">搜索具体项目</span>
              <input id="projectSearch" type="search" placeholder="搜索具体项目，找不到就在首页轻量创建" />
            </label>
            <div id="searchFeedback" class="summary-row"></div>
            <div id="homeEmptyCreate"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">当前本人任务区</p>
                <h2>本人正在进行</h2>
              </div>
            </div>
            <div id="currentSelfTask"></div>
            <div class="panel-divider"></div>
            <div class="panel-title-row compact">
              <div>
                <p class="eyebrow">运行中的 Agent 任务区</p>
                <h3>Agent 任务</h3>
              </div>
            </div>
            <div id="runningAgentTasks" class="stack-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">项目列表控制区</p>
                <h2>排序模式</h2>
              </div>
              <div class="segmented-control">
                <button id="recentModeButton" class="segment is-active" type="button">最近使用</button>
                <button id="frequentModeButton" class="segment" type="button">最常使用</button>
              </div>
            </div>
            <p class="section-caption">首页只负责项目发现、开始 / 停止任务和轻量快速创建。</p>
          </section>

          <section class="panel">
            <div class="panel-title-row compact">
              <div>
                <p class="eyebrow">项目列表区</p>
                <h2>可点击开始的具体项目</h2>
              </div>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>

        </section>

        <section id="historyView" class="view" data-view="history">
          <header class="topbar">
            <div>
              <p class="eyebrow">History</p>
              <h1>历史记录</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">排序控件区</p>
                <h2>找回发生过的事</h2>
              </div>
              <select id="historySort">
                <option value="duration">耗时长到短</option>
                <option value="desc">时间倒序</option>
                <option value="asc">时间正序</option>
              </select>
            </div>
            <div class="history-filter-grid">
              <input id="historyProjectSearch" type="search" placeholder="按具体项目检索" />
              <select id="historyDateMode">
                <option value="all">全部</option>
                <option value="day">天</option>
                <option value="week">周</option>
                <option value="month">月</option>
                <option value="year">年</option>
              </select>
              <div id="historyDateSearchWrap" class="hidden">
                <input id="historyDateSearch" type="date" />
              </div>
            </div>
            <div id="historySummary" class="summary-row"></div>
            <div id="historyList" class="history-list"></div>
          </section>
        </section>

        <section id="dashboardView" class="view" data-view="dashboard">
          <header class="topbar">
            <div>
              <p class="eyebrow">Dashboard</p>
              <h1>仪表盘</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">周期切换区</p>
                <h2>日 / 周 / 月</h2>
              </div>
              <div class="segmented-control">
                <button class="segment period-segment is-active" data-period="day" type="button">日</button>
                <button class="segment period-segment" data-period="week" type="button">周</button>
                <button class="segment period-segment" data-period="month" type="button">月</button>
              </div>
            </div>
            <div id="dashboardMetrics" class="metric-grid"></div>
            <div class="dashboard-columns">
              <div>
                <h3 class="section-subtitle">项目类型分布</h3>
                <div id="dashboardTypeBreakdown" class="stack-list"></div>
              </div>
              <div>
                <h3 class="section-subtitle">趋势</h3>
                <div id="dashboardTrend" class="stack-list"></div>
              </div>
            </div>
          </section>
        </section>

        <section id="meView" class="view" data-view="me">
          <header class="topbar">
            <div>
              <p class="eyebrow">Manage</p>
              <h1 id="manageTitle">我</h1>
            </div>
          </header>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">个人信息</p>
                <h2>昵称与座右铭</h2>
              </div>
              <button id="profileActionButton" class="inline-button" type="button">编辑</button>
            </div>
            <form id="nicknameForm" class="stack-form">
              <input id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="24" required />
              <textarea id="mottoInput" placeholder="写一句座右铭，提醒自己如何分配注意力" maxlength="80"></textarea>
            </form>
            <div id="nicknameHint" class="inline-hint"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">项目类型管理区</p>
                <h2>先把骨架管住</h2>
              </div>
            </div>
            <div class="archive-toggle-row">
              <button id="toggleTypeCreateButton" class="inline-button" type="button">新增项目类型</button>
            </div>
            <form id="typeForm" class="stack-form hidden">
              <input id="typeNameInput" type="text" placeholder="新建项目类型，例如：生活 / 工作 / 学习" required />
              <button class="primary-button" type="submit">保存新项目类型</button>
            </form>
            <div id="typeConstraintHint" class="inline-hint"></div>
            <div id="typeList" class="stack-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">具体项目管理区</p>
                <h2>活跃和归档分开看</h2>
              </div>
            </div>
            <div class="archive-toggle-row">
              <button id="toggleProjectCreateButton" class="inline-button" type="button">新增具体项目</button>
            </div>
            <form id="projectForm" class="stack-form hidden">
              <select id="projectTypeSelect" required></select>
              <input id="projectNameInput" type="text" placeholder="新建具体项目，例如：散步 / 阅读 / 跑训练" required />
              <select id="projectActorSelect" required>
                <option value="self">本人</option>
                <option value="agent">Agent</option>
              </select>
              <button class="primary-button" type="submit">保存新具体项目</button>
            </form>

            <div class="archive-toggle-row">
              <button id="toggleArchivedButton" class="inline-button" type="button">查看已归档项目</button>
            </div>
            <div id="projectAdminList" class="stack-list"></div>
            <div id="archivedProjectList" class="stack-list hidden"></div>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="一级页面导航">
        <button class="nav-item is-active" data-nav="home" type="button">
          <span class="nav-label-cn">首页</span>
          <span class="nav-label-en">Home</span>
        </button>
        <button class="nav-item" data-nav="history" type="button">
          <span class="nav-label-cn">历史记录</span>
          <span class="nav-label-en">History</span>
        </button>
        <button class="nav-item" data-nav="dashboard" type="button">
          <span class="nav-label-cn">仪表盘</span>
          <span class="nav-label-en">Dashboard</span>
        </button>
        <button class="nav-item" data-nav="me" type="button">
          <span id="manageNavLabel" class="nav-label-cn">我</span>
          <span class="nav-label-en">Manage</span>
        </button>
      </nav>
    </div>

    <template id="metricCardTemplate">
      <article class="metric-card">
        <span class="metric-label"></span>
        <strong class="metric-value"></strong>
        <p class="metric-note"></p>
      </article>
    </template>
    <script>
      (function () {
        const script = document.createElement("script");
        script.src = `./app.js?v=${window.__TEMPO_ASSET_VERSION__ || "20260316e"}`;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
